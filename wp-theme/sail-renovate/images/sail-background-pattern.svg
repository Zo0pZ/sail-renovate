<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <style>
      .s { fill: none; stroke: #46484d; stroke-width: 1.3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <!--
      Boat design, fits within a 56×80 bounding box:
        Mast:      (14,72) → (14,4)
        Pennant:   filled triangle at masthead
        Mainsail:  M14,4 Q32,34 48,68 L14,68 Z   (curved leech)
        Battens:   3 horizontal lines inside the mainsail
        Boom:      (14,68) → (48,68)
        Jib:       M14,18 Q7,40 3,55 L14,68 Z
        Hull:      M3,72 Q26,79 48,72
    -->
    <g id="boat">
      <!-- Mast -->
      <line class="s" x1="14" y1="72" x2="14" y2="4"/>
      <!-- Pennant flag (solid, matches bird fill colour) -->
      <polygon points="14,4 21,7.5 14,11" fill="#46484d"/>
      <!-- Mainsail — curved leech using quadratic bezier -->
      <path class="s" d="M14,4 Q32,34 48,68 L14,68 Z"/>
      <!-- Battens (at approx y=29, 45, 58 on the sail curve) -->
      <line class="s" x1="14" y1="29" x2="28" y2="29"/>
      <line class="s" x1="14" y1="45" x2="37" y2="45"/>
      <line class="s" x1="14" y1="58" x2="43" y2="58"/>
      <!-- Boom -->
      <line class="s" x1="14" y1="68" x2="48" y2="68"/>
      <!-- Jib / headsail -->
      <path class="s" d="M14,18 Q7,40 3,55 L14,68 Z"/>
      <!-- Hull -->
      <path class="s" d="M3,72 Q26,79 48,72"/>
    </g>
  </defs>

  <!--
    Layout: 400×400, tile width ≈ 75px, tile height ≈ 95px
    Even rows: 5 boats facing right  at x = 5, 80, 155, 230, 305
    Odd rows:  5 boats facing left   centred between even-row boats
               Mirrored via transform="translate(px+56, y) scale(-1,1)"
               where px = 38, 113, 188, 263, 338  →  px+56 = 94, 169, 244, 319, 394
  -->

  <!-- ── Row 0  y=10  right-facing ── -->
  <use href="#boat" transform="translate(5,10)"/>
  <use href="#boat" transform="translate(80,10)"/>
  <use href="#boat" transform="translate(155,10)"/>
  <use href="#boat" transform="translate(230,10)"/>
  <use href="#boat" transform="translate(305,10)"/>

  <!-- ── Row 1  y=105  left-facing ── -->
  <use href="#boat" transform="translate(94,105) scale(-1,1)"/>
  <use href="#boat" transform="translate(169,105) scale(-1,1)"/>
  <use href="#boat" transform="translate(244,105) scale(-1,1)"/>
  <use href="#boat" transform="translate(319,105) scale(-1,1)"/>
  <use href="#boat" transform="translate(394,105) scale(-1,1)"/>

  <!-- ── Row 2  y=200  right-facing ── -->
  <use href="#boat" transform="translate(5,200)"/>
  <use href="#boat" transform="translate(80,200)"/>
  <use href="#boat" transform="translate(155,200)"/>
  <use href="#boat" transform="translate(230,200)"/>
  <use href="#boat" transform="translate(305,200)"/>

  <!-- ── Row 3  y=295  left-facing ── -->
  <use href="#boat" transform="translate(94,295) scale(-1,1)"/>
  <use href="#boat" transform="translate(169,295) scale(-1,1)"/>
  <use href="#boat" transform="translate(244,295) scale(-1,1)"/>
  <use href="#boat" transform="translate(319,295) scale(-1,1)"/>
  <use href="#boat" transform="translate(394,295) scale(-1,1)"/>

</svg>
