name: Deploy to WordPress

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync theme to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SPLIT=$(git subtree split --prefix wp-theme/sail-renovate HEAD)
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/Zo0pZ/sail-renovate.git" ${SPLIT}:refs/heads/deploy --force

      - name: Trigger Deployer for Git
        env:
          DFG_URL: ${{ secrets.DFG_THEME_DEPLOY_URL }}
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" --max-time 60 "$DFG_URL" || echo "curl_failed_$?")
          echo "HTTP status: $HTTP_CODE"
          cat response.json 2>/dev/null || echo "(no response body)"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
